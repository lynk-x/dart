name: lynk_x
description: Experience the ultimate event app designed for seamless event interactions.
publish_to: 'none'
version: 0.1.0

environment:
  sdk: '>=3.2.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  lynk_core:
    path: ../../packages/lynk_core
  supabase_flutter: ^2.6.0
  cupertino_icons: ^1.0.8
  google_fonts: ^6.2.1
  badges: ^3.1.2
  file_picker: ^10.3.10
  flutter_animate: ^4.5.2
  go_router: ^14.0.0
  http: ^1.6.0
  image_picker: ^1.2.1
  intl: ^0.20.2
  photo_view: ^0.15.0
  timeago: ^3.7.1
  universal_io: ^2.3.1
  video_player: ^2.10.1
  barcode_widget: ^2.0.4
  geolocator: ^13.0.2
  dio: ^5.7.0
  path_provider: ^2.1.2
  share_plus: ^10.1.4
  url_launcher: ^6.3.0
  cached_network_image: ^3.4.1
  flutter_bloc: ^9.1.1
  equatable: ^2.0.8
  gal: ^2.3.2
  sqflite: ^2.3.3+3
  path: ^1.9.0
  uuid: ^4.5.1
  flutter_image_compress: ^2.3.0
  video_thumbnail: ^0.5.3
  package_info_plus: ^8.2.1
  add_2_calendar: ^3.0.1
  # Push notifications via Firebase Cloud Messaging
  firebase_core: ^3.12.1
  firebase_messaging: ^15.2.4
  flutter_local_notifications: ^18.0.1
  # Crash reporting — wired to the 'enable_crash_reporting' feature flag.
  # DSN is injected via --dart-define=SENTRY_DSN=https://... at build time.
  sentry_flutter: ^8.14.0




dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  flutter_launcher_icons: ^0.14.4

flutter_launcher_icons:
  android: "launcher_icon"
  ios: true
  image_path: "assets/images/lynk-x_logo.png"
  min_sdk_android: 21
  adaptive_icon_background: "#000000"
  adaptive_icon_foreground: "assets/images/lynk-x_logo.png"

flutter:
  generate: true
  uses-material-design: true
  assets:
    - assets/images/
    - assets/icons/



